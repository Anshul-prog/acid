# =============================================================================
#  L.S.D — Apache Flume Pipeline Configuration
# =============================================================================
#  Real-time log and server event ingestion directly into HDFS.
#
#  Architecture:
#    [LSD API Server stdout/logs]
#        → Flume Source (Exec / Taildir)
#        → Channel (File Channel — durable, survives restarts)
#        → Sink (HDFS — writes Parquet/Avro, rolls every 5 minutes)
#
#    [Syslog / Audit events]
#        → Flume Source (Syslog UDP:5140)
#        → Channel (Memory Channel — high throughput, lower durability)
#        → Sink (HDFS audit path)
#
#  Start Flume:
#    flume-ng agent \
#      --name lsd_agent \
#      --conf $FLUME_HOME/conf \
#      --conf-file hadoop/flume-lsd.conf \
#      --Dflume.root.logger=INFO,console
# =============================================================================

# ── Agent definition ──────────────────────────────────────────────────────────
lsd_agent.sources  = api_logs audit_syslog
lsd_agent.channels = file_channel mem_channel
lsd_agent.sinks    = hdfs_log_sink hdfs_audit_sink

# =============================================================================
# SOURCE 1: LSD API Log File (taildir — survives rotation)
# =============================================================================
lsd_agent.sources.api_logs.type                           = TAILDIR
lsd_agent.sources.api_logs.positionFile                   = /var/run/flume/lsd_taildir_position.json
lsd_agent.sources.api_logs.filegroups                     = f1
lsd_agent.sources.api_logs.filegroups.f1                  = /opt/acid/logs/.*\\.log
lsd_agent.sources.api_logs.fileHeader                     = true
lsd_agent.sources.api_logs.fileHeaderKey                  = source_file
lsd_agent.sources.api_logs.batchSize                      = 1000
lsd_agent.sources.api_logs.maxBatchCount                  = 10
lsd_agent.sources.api_logs.channels                       = file_channel
# Intercept: add timestamp + host to every event
lsd_agent.sources.api_logs.interceptors                    = ts host json_filter
lsd_agent.sources.api_logs.interceptors.ts.type            = timestamp
lsd_agent.sources.api_logs.interceptors.host.type          = host
lsd_agent.sources.api_logs.interceptors.host.useIP         = true
# Only forward structured JSON log lines (skip startup banners)
lsd_agent.sources.api_logs.interceptors.json_filter.type  = regex_filter
lsd_agent.sources.api_logs.interceptors.json_filter.regex  = ^\{.*\}$
lsd_agent.sources.api_logs.interceptors.json_filter.excludeEvents = false

# =============================================================================
# SOURCE 2: Audit / Security events via Syslog UDP
# =============================================================================
lsd_agent.sources.audit_syslog.type        = syslogudp
lsd_agent.sources.audit_syslog.port        = 5140
lsd_agent.sources.audit_syslog.host        = 0.0.0.0
lsd_agent.sources.audit_syslog.channels   = mem_channel
lsd_agent.sources.audit_syslog.interceptors          = ts2
lsd_agent.sources.audit_syslog.interceptors.ts2.type = timestamp

# =============================================================================
# CHANNEL 1: File Channel (durable — API logs must not be lost)
# =============================================================================
lsd_agent.channels.file_channel.type                     = file
lsd_agent.channels.file_channel.checkpointDir            = /var/flume/checkpoint/lsd_api
lsd_agent.channels.file_channel.dataDirs                 = /var/flume/data/lsd_api
lsd_agent.channels.file_channel.capacity                 = 10000000
lsd_agent.channels.file_channel.transactionCapacity      = 10000
lsd_agent.channels.file_channel.checkpointInterval       = 30000
lsd_agent.channels.file_channel.maxFileSize              = 2146435071
lsd_agent.channels.file_channel.minimumRequiredSpace     = 524288000

# =============================================================================
# CHANNEL 2: Memory Channel (high-throughput for audit syslog)
# =============================================================================
lsd_agent.channels.mem_channel.type              = memory
lsd_agent.channels.mem_channel.capacity          = 1000000
lsd_agent.channels.mem_channel.transactionCapacity = 10000

# =============================================================================
# SINK 1: HDFS — API Logs → /lsd/logs/api/YYYY/MM/DD/HH/
# =============================================================================
lsd_agent.sinks.hdfs_log_sink.type                  = hdfs
lsd_agent.sinks.hdfs_log_sink.channel               = file_channel
lsd_agent.sinks.hdfs_log_sink.hdfs.path             = hdfs://namenode:9000/lsd/logs/api/%Y/%m/%d/%H
lsd_agent.sinks.hdfs_log_sink.hdfs.filePrefix       = lsd_api_
lsd_agent.sinks.hdfs_log_sink.hdfs.fileSuffix       = .json.gz
lsd_agent.sinks.hdfs_log_sink.hdfs.fileType         = CompressedStream
lsd_agent.sinks.hdfs_log_sink.hdfs.codeC            = gzip
lsd_agent.sinks.hdfs_log_sink.hdfs.writeFormat      = Text
lsd_agent.sinks.hdfs_log_sink.hdfs.batchSize        = 10000
# Roll file every 5 minutes or 128 MB — whichever comes first
lsd_agent.sinks.hdfs_log_sink.hdfs.rollInterval     = 300
lsd_agent.sinks.hdfs_log_sink.hdfs.rollSize         = 134217728
lsd_agent.sinks.hdfs_log_sink.hdfs.rollCount        = 0
# Use UTC timestamps for partitioning
lsd_agent.sinks.hdfs_log_sink.hdfs.useLocalTimeStamp = false
lsd_agent.sinks.hdfs_log_sink.hdfs.round            = true
lsd_agent.sinks.hdfs_log_sink.hdfs.roundValue       = 5
lsd_agent.sinks.hdfs_log_sink.hdfs.roundUnit        = minute
# HDFS tuning
lsd_agent.sinks.hdfs_log_sink.hdfs.threadsPoolSize   = 10
lsd_agent.sinks.hdfs_log_sink.hdfs.callTimeout       = 60000
lsd_agent.sinks.hdfs_log_sink.hdfs.idleTimeout       = 10

# =============================================================================
# SINK 2: HDFS — Audit events → /lsd/logs/audit/YYYY/MM/DD/
# =============================================================================
lsd_agent.sinks.hdfs_audit_sink.type                = hdfs
lsd_agent.sinks.hdfs_audit_sink.channel             = mem_channel
lsd_agent.sinks.hdfs_audit_sink.hdfs.path           = hdfs://namenode:9000/lsd/logs/audit/%Y/%m/%d
lsd_agent.sinks.hdfs_audit_sink.hdfs.filePrefix     = audit_
lsd_agent.sinks.hdfs_audit_sink.hdfs.fileSuffix     = .log.gz
lsd_agent.sinks.hdfs_audit_sink.hdfs.fileType       = CompressedStream
lsd_agent.sinks.hdfs_audit_sink.hdfs.codeC          = gzip
lsd_agent.sinks.hdfs_audit_sink.hdfs.writeFormat    = Text
lsd_agent.sinks.hdfs_audit_sink.hdfs.batchSize      = 5000
lsd_agent.sinks.hdfs_audit_sink.hdfs.rollInterval   = 3600
lsd_agent.sinks.hdfs_audit_sink.hdfs.rollSize       = 67108864
lsd_agent.sinks.hdfs_audit_sink.hdfs.rollCount      = 0
lsd_agent.sinks.hdfs_audit_sink.hdfs.useLocalTimeStamp = false
